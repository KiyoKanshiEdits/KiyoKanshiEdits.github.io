<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting... — KiyoKanshiEdits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #12121e; border: 1px solid #1e1e35; border-radius: 16px; padding: 50px 40px; max-width: 420px; width: 90%; text-align: center; }
    .spinner { width: 44px; height: 44px; border: 3px solid #1e1e35; border-top-color: #7b2fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.4em; margin-bottom: 10px; }
    p { color: #888; font-size: 0.9em; line-height: 1.6; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Connecting TikTok...</h1>
  <p id="msg">Completing authentication, please wait.</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');
  const API_BASE = localStorage.getItem('api_base') || '';

  async function exchangeToken() {
    if (error || !code) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Connection failed';
      document.getElementById('msg').innerHTML = '<span class="error">TikTok access was denied. <a href="/" style="color:#7b2fff">Try again</a></span>';
      return;
    }
    if (!API_BASE) {
      // No API server — go straight to post page
      document.getElementById('title').textContent = 'Connected!';
      document.getElementById('msg').textContent = 'Redirecting to post page...';
      setTimeout(() => window.location.href = '/post.html', 1500);
      return;
    }
    try {
      const res  = await fetch(`${API_BASE}/auth/token`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
        body:    JSON.stringify({ code, state })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('tiktok_access_token', data.access_token);
        document.getElementById('title').textContent = 'Connected!';
        document.getElementById('msg').textContent   = 'Redirecting to post page...';
        setTimeout(() => window.location.href = `/post.html?api=${encodeURIComponent(API_BASE)}&token=${encodeURIComponent(data.access_token)}`, 1200);
      } else {
        throw new Error(JSON.stringify(data.error));
      }
    } catch(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Error';
      document.getElementById('msg').innerHTML = `<span class="error">Token exchange failed. <a href="/" style="color:#7b2fff">Try again</a></span>`;
    }
  }
  exchangeToken();
</script>
</body>
</html>
