<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting... — KiyoKanshiEdits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #12121e; border: 1px solid #1e1e35; border-radius: 16px; padding: 50px 40px; max-width: 420px; width: 90%; text-align: center; }
    .spinner { width: 44px; height: 44px; border: 3px solid #1e1e35; border-top-color: #7b2fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.4em; margin-bottom: 10px; }
    p { color: #888; font-size: 0.9em; line-height: 1.6; }
    .badge { display: inline-block; background: linear-gradient(90deg, #7b2fff33, #ff3cac33); border: 1px solid #7b2fff55; border-radius: 20px; padding: 4px 14px; font-size: 0.8em; color: #cc88ff; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <div class="badge" id="badge">Connecting</div>
  <h1 id="title">Connecting TikTok...</h1>
  <p id="msg">Completing authentication, please wait.</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  if (error || !code) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('badge').textContent = 'Failed';
    document.getElementById('title').textContent = 'Connection failed';
    document.getElementById('msg').innerHTML = 'TikTok access was denied. <a href="/" style="color:#7b2fff">Try again</a>';
  } else {
    // Auth code received — redirect to post page
    document.getElementById('badge').textContent = 'Connected';
    document.getElementById('title').textContent = 'TikTok Connected!';
    document.getElementById('msg').textContent = 'Redirecting to post page...';
    setTimeout(() => {
      window.location.href = '/post.html';
    }, 1500);
  }
</script>
</body>
</html>
